spring:
  application:
    name: identity-service

  config:
    import: optional:classpath:application-secrets.yml

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/swiftcare}
    username: ${DB_USERNAME:swiftcare}
    password: ${DB_PASSWORD:swiftcare}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-minimum-32-characters}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

  password-reset:
    expiry-minutes: ${PASSWORD_RESET_EXPIRY_MINUTES:15}
    reset-url: ${PASSWORD_RESET_URL:swiftcare://reset-password}

  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
    sender-name: ${MAIL_SENDER_NAME:SwiftCare}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

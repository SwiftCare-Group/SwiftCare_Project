spring:
  application:
    name: database-migration-runner
  main:
    web-application-type: none
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/swiftcare}
    username: ${DB_USERNAME:swiftcare}
    password: ${DB_PASSWORD:swiftcare}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

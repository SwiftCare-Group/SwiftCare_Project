spring:
  application:
    name: symptom-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/swiftcare}
    username: ${DB_USERNAME:swiftcare}
    password: ${DB_PASSWORD:swiftcare}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-minimum-32-characters}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

ai:
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gemini-2.0-flash-lite}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

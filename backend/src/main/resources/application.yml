spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: swiftcare-dev-secret-key-minimum-32-characters-long
    expiry-ms: 86400000

paystack:
  secret-key: your_paystack_test_secret_key

ai:
  api-key: your_claude_openai_key
  model: gemini-2.0-flash-lite

firebase:
  credentials-path: firebase-service-account.json
